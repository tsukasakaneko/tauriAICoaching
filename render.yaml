services:
  - type: web
    name: valorant-coaching-api
    env: node
    plan: free
    rootDir: backend-remote
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Render ダッシュボードで手動設定
      - key: JWT_SECRET
        sync: false          # ローカル backend/.env と同じ値を設定
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false          # Stripe ダッシュボードで取得した sk_live_xxx を設定
      - key: STRIPE_WEBHOOK_SECRET
        sync: false          # Stripe Webhook 署名シークレット whsec_xxx
      - key: STRIPE_PRICE_STARTER
        sync: false          # price_xxx (300円 one-time / metadata.tier=credit10)
      - key: STRIPE_PRICE_STANDARD
        sync: false          # price_xxx (800円 one-time / metadata.tier=credit30)
      - key: STRIPE_PRICE_PRO_PACK
        sync: false          # price_xxx (1,980円 one-time / metadata.tier=credit80)
      - key: STRIPE_PRICE_MONTHLY
        sync: false          # price_xxx (980円/月 recurring / metadata.tier=cloud)
      - key: STRIPE_PRICE_YEARLY
        sync: false          # price_xxx (8,800円/年 recurring / metadata.tier=cloud_yearly)
      - key: LICENSE_PRIVATE_KEY
        sync: false          # Ed25519 秘密鍵 (base64url, 43文字)
      - key: SENDGRID_API_KEY
        sync: false          # SendGrid API キー (省略時はコンソールログのみ)
      - key: EMAIL_FROM
        sync: false          # 送信元メールアドレス
      - key: DB_PATH
        value: ./data/licenses.db
        # 注意: free プランはファイルシステムが揮発性のため、再デプロイ/再起動で
        # クレジット台帳 (SQLite) が消えます。本番運用では Starter プラン以上に変更し、
        # 以下のディスク設定を有効化して DB_PATH を /var/data/licenses.db にしてください。
    # disk:
    #   name: license-data
    #   mountPath: /var/data
    #   sizeGB: 1
